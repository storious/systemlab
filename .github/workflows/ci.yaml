name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  searchrs:
    name: SearchRS / Rust
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: searchrs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features

      - name: Build
        run: cargo build

  gdfs:
    name: GDFS / Go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gdfs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: gdfs/go.sum

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test ./... -v

      - name: Build
        run: make build

  zigkv:
    name: ZigKV / Zig
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zigkv

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format
        run: zig fmt --check build.zig src/*.zig

      - name: Lint
        run: make lint

      - name: Tests
        run: make test

      - name: Build
        run: make build
